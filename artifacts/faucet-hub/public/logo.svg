<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="46" stroke="#22c55e" stroke-width="2.5" stroke-opacity="0.25"/>

  <!-- Chain links - left arc -->
  <path d="M22 38 Q14 50 22 62" stroke="#22c55e" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M26 35 Q18 50 26 65" stroke="#4ade80" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Chain links - right arc -->
  <path d="M78 38 Q86 50 78 62" stroke="#22c55e" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M74 35 Q82 50 74 65" stroke="#4ade80" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Chain connector top -->
  <rect x="34" y="28" width="32" height="10" rx="5" stroke="#22c55e" stroke-width="2.5" fill="#22c55e" fill-opacity="0.12"/>
  <!-- Chain connector bottom -->
  <rect x="34" y="62" width="32" height="10" rx="5" stroke="#22c55e" stroke-width="2.5" fill="#22c55e" fill-opacity="0.12"/>

  <!-- Faucet pipe body -->
  <rect x="43" y="33" width="14" height="8" rx="3" fill="#16a34a"/>
  <!-- Faucet spout -->
  <path d="M52 41 L58 41 Q62 41 62 46 L62 48" stroke="#16a34a" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Faucet handle -->
  <rect x="43" y="30" width="14" height="4" rx="2" fill="#15803d"/>
  <rect x="49" y="26" width="2" height="6" rx="1" fill="#15803d"/>

  <!-- Water drop main -->
  <path d="M62 52 Q62 64 56 68 Q50 72 44 68 Q38 64 38 56 Q38 48 50 40 Q62 48 62 52Z" fill="url(#dropGrad)" opacity="0.95"/>
  <!-- Drop shine -->
  <ellipse cx="45" cy="54" rx="3.5" ry="5" fill="white" opacity="0.18" transform="rotate(-20 45 54)"/>

  <!-- Inner sparkle -->
  <circle cx="50" cy="57" r="2.5" fill="#86efac" opacity="0.6"/>

  <defs>
    <radialGradient id="dropGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </radialGradient>
  </defs>
</svg>
