<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="50%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#061a0a"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00cc66;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="coin1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7c948"/>
      <stop offset="100%" style="stop-color:#e5a800"/>
    </linearGradient>
    <linearGradient id="coin2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#627eea"/>
      <stop offset="100%" style="stop-color:#3b5bdb"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Green glow left -->
  <ellipse cx="200" cy="100" rx="180" ry="100" fill="url(#glow1)" filter="url(#blur1)"/>
  <!-- Purple glow right -->
  <ellipse cx="750" cy="100" rx="160" ry="90" fill="url(#glow2)" filter="url(#blur1)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="200" fill="url(#greenGlow)" rx="2"/>

  <!-- Logo hexagon -->
  <polygon points="70,40 95,25 120,40 120,70 95,85 70,70" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.9"/>
  <polygon points="77,44 95,33 113,44 113,66 95,77 77,66" fill="#00ff88" fill-opacity="0.1"/>
  <text x="95" y="60" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="18" fill="#00ff88">CD</text>

  <!-- Stars -->
  <circle cx="350" cy="20" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="480" cy="35" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="560" cy="15" r="1.5" fill="#00ff88" opacity="0.5"/>
  <circle cx="680" cy="25" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="800" cy="18" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="840" cy="40" r="1" fill="#00ff88" opacity="0.4"/>

  <!-- Main brand text -->
  <text x="148" y="78" font-family="'Courier New', monospace" font-weight="900" font-size="42" fill="#00ff88" letter-spacing="4" filter="url(#blur1)" opacity="0.4">CHAINDROP</text>
  <text x="148" y="78" font-family="'Courier New', monospace" font-weight="900" font-size="42" fill="#00ff88" letter-spacing="4">CHAINDROP</text>

  <!-- Subtitle -->
  <text x="148" y="102" font-family="'Courier New', monospace" font-size="12" fill="#ffffff" opacity="0.5" letter-spacing="6">YOUR ULTIMATE MULTI-CHAIN FAUCET HUB</text>

  <!-- Divider line -->
  <line x1="148" y1="115" x2="500" y2="115" stroke="#00ff88" stroke-width="1" opacity="0.3"/>

  <!-- Feature tags -->
  <rect x="148" y="126" width="100" height="22" rx="11" fill="#00ff88" fill-opacity="0.12" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4"/>
  <text x="198" y="141" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff88" letter-spacing="1">FREE TOKENS</text>

  <rect x="258" y="126" width="100" height="22" rx="11" fill="#00ff88" fill-opacity="0.12" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4"/>
  <text x="308" y="141" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff88" letter-spacing="1">20+ CHAINS</text>

  <rect x="368" y="126" width="110" height="22" rx="11" fill="#00ff88" fill-opacity="0.12" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4"/>
  <text x="423" y="141" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff88" letter-spacing="1">INSTANT CLAIM</text>

  <!-- Bottom text -->
  <text x="148" y="178" font-family="monospace" font-size="11" fill="#ffffff" opacity="0.35" letter-spacing="2">TESTNET · MAINNET · DEX · FAUCET</text>

  <!-- Right side: Floating crypto coins -->
  <!-- BTC coin -->
  <circle cx="640" cy="80" r="32" fill="url(#coin1)" opacity="0.9"/>
  <circle cx="640" cy="80" r="28" fill="none" stroke="#f7c948" stroke-width="1" opacity="0.4"/>
  <text x="640" y="87" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="20" fill="#7a4f00">₿</text>

  <!-- ETH coin -->
  <circle cx="730" cy="55" r="26" fill="url(#coin2)" opacity="0.9"/>
  <circle cx="730" cy="55" r="22" fill="none" stroke="#627eea" stroke-width="1" opacity="0.4"/>
  <text x="730" y="62" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="18" fill="#ffffff">Ξ</text>

  <!-- Small coin -->
  <circle cx="820" cy="100" r="22" fill="#1a1a2e" opacity="0.9" stroke="#e040fb" stroke-width="1.5"/>
  <text x="820" y="107" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="14" fill="#e040fb">◎</text>

  <!-- Orbit rings -->
  <ellipse cx="710" cy="110" rx="90" ry="25" fill="none" stroke="#00ff88" stroke-width="1" stroke-dasharray="4 4" opacity="0.15"/>
  <ellipse cx="710" cy="110" rx="120" ry="38" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="6 6" opacity="0.1"/>

  <!-- CTA button -->
  <rect x="620" y="148" width="240" height="34" rx="17" fill="#00ff88" fill-opacity="0.15" stroke="#00ff88" stroke-width="1.5"/>
  <text x="740" y="169" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="13" fill="#00ff88" letter-spacing="3">CLAIM FREE TOKENS →</text>

  <!-- Corner accent -->
  <line x1="860" y1="0" x2="900" y2="0" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="900" y1="0" x2="900" y2="40" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="160" x2="0" y2="200" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="200" x2="40" y2="200" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
</svg>
