kind = "web"
previewPath = "/"
title = "Faucet Hub"
version = "1.0.0"
id = "artifacts/faucet-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22746

[services.development]
run = "pnpm --filter @workspace/faucet-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/faucet-hub", "run", "build" ]
publicDir = "artifacts/faucet-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22746"
BASE_PATH = "/"
