openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ChainDrop — Multi-chain faucet hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: chains
  - name: faucet
  - name: exchange
  - name: banners
  - name: announcements
  - name: prices
  - name: admin
  - name: support
  - name: settings
  - name: referral

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chains:
    get:
      operationId: getChains
      tags: [chains]
      summary: List enabled chains
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [testnet, mainnet]
      responses:
        "200":
          description: List of chains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChainPublic"

  /chains/{id}:
    get:
      operationId: getChain
      tags: [chains]
      summary: Get single chain detail with live balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chain detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/claim:
    post:
      operationId: claimFaucet
      tags: [faucet]
      summary: Claim tokens from a chain faucet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimInput"
      responses:
        "200":
          description: Claim successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/status/{chainId}/{address}:
    get:
      operationId: getFaucetStatus
      tags: [faucet]
      summary: Get claim cooldown status for address on a chain
      parameters:
        - name: chainId
          in: path
          required: true
          schema:
            type: integer
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Claim status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/buy/info/{chainId}:
    get:
      operationId: getBuyInfo
      tags: [faucet]
      summary: Get buy rate and receiver address for a chain
      parameters:
        - name: chainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Buy info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyInfo"
        "404":
          description: Not found or buy disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/buy:
    post:
      operationId: submitBuy
      tags: [faucet]
      summary: Submit mainnet tx hash to receive testnet tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyInput"
      responses:
        "200":
          description: Testnet tokens sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/ad-token:
    post:
      operationId: requestAdToken
      tags: [faucet]
      summary: Request a time-locked ad-watch token for an extra claim during cooldown
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdTokenBody"
      responses:
        "200":
          description: Ad token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdTokenResponse"
        "400":
          description: Bad request or ad claims not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/ad-claim:
    post:
      operationId: claimFaucetWithAd
      tags: [faucet]
      summary: Claim tokens after watching an ad using a verified time-locked token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdClaimBody"
      responses:
        "200":
          description: Claim successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResult"
        "400":
          description: Bad request or token invalid/expired/already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/history:
    get:
      operationId: getFaucetHistory
      tags: [faucet]
      summary: Recent claims across all chains
      responses:
        "200":
          description: Recent claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClaimRecord"

  /banners:
    get:
      operationId: getBanners
      tags: [banners]
      summary: List active ad banners
      responses:
        "200":
          description: Active banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"

  /announcements:
    get:
      operationId: getAnnouncements
      tags: [announcements]
      summary: List active announcements
      responses:
        "200":
          description: Active announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

  /prices:
    get:
      operationId: getPrices
      tags: [prices]
      summary: Live crypto prices from CoinGecko
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated CoinGecko IDs e.g. ethereum,binancecoin
      responses:
        "200":
          description: Price data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceItem"

  /referral/dashboard/{wallet}:
    get:
      operationId: getReferralDashboard
      tags: [referral]
      summary: Get referral dashboard for a wallet address
      parameters:
        - name: wallet
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Referral dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralDashboard"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /referral/nonce/{wallet}:
    get:
      operationId: getReferralNonce
      tags: [referral]
      summary: Get a signing nonce for wallet
      parameters:
        - name: wallet
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Nonce
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralNonce"

  /referral/claim-request:
    post:
      operationId: submitReferralClaimRequest
      tags: [referral]
      summary: Submit a commission claim request with wallet signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferralClaimRequestInput"
      responses:
        "200":
          description: Claim request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralClaimRequestResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /referral/register:
    post:
      operationId: registerReferral
      tags: [referral]
      summary: Register a referral relationship (called when referee first visits with ref param)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterReferralInput"
      responses:
        "200":
          description: Referral registered or already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterReferralResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /referral/settings:
    get:
      operationId: getReferralSettings
      tags: [referral]
      summary: Get public referral settings (for maintenance mode check)
      responses:
        "200":
          description: Referral settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralSettingsPublic"

  /admin/referral/settings:
    get:
      operationId: getAdminReferralSettings
      tags: [admin]
      summary: Get full referral system settings
      responses:
        "200":
          description: Referral settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralSettings"
    put:
      operationId: updateAdminReferralSettings
      tags: [admin]
      summary: Update referral system settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferralSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralSettings"

  /admin/referral/users:
    get:
      operationId: getAdminReferralUsers
      tags: [admin]
      summary: List all referrers with stats
      responses:
        "200":
          description: Referral user list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReferralUserSummary"

  /admin/referral/users/{wallet}:
    get:
      operationId: getAdminReferralUser
      tags: [admin]
      summary: Get detailed referral info for a wallet
      parameters:
        - name: wallet
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Referral user detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralUserDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/referral/claim-requests:
    get:
      operationId: getAdminReferralClaimRequests
      tags: [admin]
      summary: List all commission claim requests
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: Claim requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReferralClaimRequestAdmin"

  /admin/referral/claim-requests/{id}/approve:
    post:
      operationId: approveReferralClaimRequest
      tags: [admin]
      summary: Approve a commission claim request and send ETH
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveClaimInput"
      responses:
        "200":
          description: Approved and sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralClaimRequestAdmin"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/referral/users/{wallet}/adjust-balance:
    post:
      operationId: adminAdjustReferralBalance
      tags: [admin]
      summary: Add or deduct referral balance for a wallet
      parameters:
        - name: wallet
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAdjustBalanceInput"
      responses:
        "200":
          description: Adjustment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralBalanceAdjustment"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/referral/claim-requests/{id}/reject:
    post:
      operationId: rejectReferralClaimRequest
      tags: [admin]
      summary: Reject a commission claim request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectClaimInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralClaimRequestAdmin"

  /admin/auth:
    post:
      operationId: adminAuth
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAuthInput"
      responses:
        "200":
          description: JWT token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Overall faucet statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/chains:
    get:
      operationId: getAdminChains
      tags: [admin]
      summary: List all chains (admin)
      responses:
        "200":
          description: All chains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChainAdmin"
    post:
      operationId: createChain
      tags: [admin]
      summary: Create a new chain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChainInput"
      responses:
        "201":
          description: Created chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainAdmin"

  /admin/chains/{id}/rpc-health:
    get:
      operationId: getChainRpcHealth
      tags: [admin]
      summary: Check health/latency of all RPC URLs for a chain
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RPC health results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RpcHealthResult"
        "404":
          description: Not found

  /admin/chains/{id}:
    patch:
      operationId: updateChain
      tags: [admin]
      summary: Update a chain
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChainUpdate"
      responses:
        "200":
          description: Updated chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainAdmin"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteChain
      tags: [admin]
      summary: Delete a chain
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings (public)
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /admin/settings:
    patch:
      operationId: updateSettings
      tags: [settings, admin]
      summary: Update site settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /admin/banners:
    get:
      operationId: getAdminBanners
      tags: [admin]
      summary: List all banners (admin)
      responses:
        "200":
          description: All banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"
    post:
      operationId: createBanner
      tags: [admin]
      summary: Create a banner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BannerInput"
      responses:
        "201":
          description: Created banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"

  /admin/banners/{id}:
    patch:
      operationId: updateBanner
      tags: [admin]
      summary: Update a banner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BannerUpdate"
      responses:
        "200":
          description: Updated banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBanner
      tags: [admin]
      summary: Delete a banner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/announcements:
    get:
      operationId: getAdminAnnouncements
      tags: [admin]
      summary: List all announcements (admin)
      responses:
        "200":
          description: All announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [admin]
      summary: Create an announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /admin/announcements/{id}:
    patch:
      operationId: updateAnnouncement
      tags: [admin]
      summary: Update an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAnnouncement
      tags: [admin]
      summary: Delete an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /support/conversations:
    post:
      operationId: startSupportConversation
      tags: [support]
      summary: Start a new support conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportStartInput"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportConversation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /support/conversations/{id}/messages:
    get:
      operationId: getSupportMessages
      tags: [support]
      summary: Get messages for a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportConversationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendSupportMessage
      tags: [support]
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportMessage"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/support:
    get:
      operationId: getAdminSupportConversations
      tags: [support]
      summary: List all support conversations (admin)
      responses:
        "200":
          description: All conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportConversation"

  /admin/support/{id}:
    get:
      operationId: getAdminSupportConversation
      tags: [support]
      summary: Get a conversation with all messages (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportConversationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSupportConversation
      tags: [support]
      summary: Update conversation status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [open, closed]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportConversation"

  /admin/support/{id}/reply:
    post:
      operationId: adminReplySupportConversation
      tags: [support]
      summary: Admin reply to a support conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportMessageInput"
      responses:
        "201":
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/upload:
    post:
      operationId: uploadImage
      tags: [admin]
      summary: Upload an image (logo, banner, etc.)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

