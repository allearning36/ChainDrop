            $ref: "#/components/schemas/ReferralRecord"
        commissions:
          type: array
          items:
            $ref: "#/components/schemas/ReferralCommissionRecord"
        claimRequests:
          type: array
          items:
            $ref: "#/components/schemas/ReferralClaimRequestAdmin"
        adjustments:
          type: array
          items:
            $ref: "#/components/schemas/ReferralBalanceAdjustment"

    ReferralRecord:
      type: object
      required: [id, refereeAddress, level, createdAt]
      properties:
        id:
          type: integer
        refereeAddress:
          type: string
        level:
          type: integer
        createdAt:
          type: string
          format: date-time

    ReferralClaimRequestAdmin:
      type: object
      required: [id, walletAddress, amountEth, claimChainId, status, createdAt]
      properties:
        id:
          type: integer
        walletAddress:
          type: string
        amountEth:
          type: string
        claimChainId:
          type: integer
        status:
          type: string
        adminNote:
          type: ["string", "null"]
        txHash:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        processedAt:
          type: ["string", "null"]
          format: date-time

    ApproveClaimInput:
      type: object
      required: [chainId]
      properties:
        chainId:
          type: integer
        note:
          type: string

    RejectClaimInput:
      type: object
      required: [note]
      properties:
        note:
          type: string
