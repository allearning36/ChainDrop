openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ChainDrop — Multi-chain faucet hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: chains
  - name: faucet
  - name: banners
  - name: announcements
  - name: prices
  - name: admin
  - name: support
  - name: settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chains:
    get:
      operationId: getChains
      tags: [chains]
      summary: List enabled chains
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [testnet, mainnet]
      responses:
        "200":
          description: List of chains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChainPublic"

  /chains/{id}:
    get:
      operationId: getChain
      tags: [chains]
      summary: Get single chain detail with live balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chain detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/claim:
    post:
      operationId: claimFaucet
      tags: [faucet]
      summary: Claim tokens from a chain faucet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimInput"
      responses:
        "200":
          description: Claim successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/status/{chainId}/{address}:
    get:
      operationId: getFaucetStatus
      tags: [faucet]
      summary: Get claim cooldown status for address on a chain
      parameters:
        - name: chainId
          in: path
          required: true
          schema:
            type: integer
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Claim status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimStatus"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/buy/info/{chainId}:
    get:
      operationId: getBuyInfo
      tags: [faucet]
      summary: Get buy rate and receiver address for a chain
      parameters:
        - name: chainId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Buy info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyInfo"
        "404":
          description: Not found or buy disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/buy:
    post:
      operationId: submitBuy
      tags: [faucet]
      summary: Submit mainnet tx hash to receive testnet tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyInput"
      responses:
        "200":
          description: Testnet tokens sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/ad-token:
    post:
      operationId: requestAdToken
      tags: [faucet]
      summary: Request a time-locked ad-watch token for an extra claim during cooldown
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdTokenBody"
      responses:
        "200":
          description: Ad token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdTokenResponse"
        "400":
          description: Bad request or ad claims not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/ad-claim:
    post:
      operationId: claimFaucetWithAd
      tags: [faucet]
      summary: Claim tokens after watching an ad using a verified time-locked token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdClaimBody"
      responses:
        "200":
          description: Claim successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResult"
        "400":
          description: Bad request or token invalid/expired/already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /faucet/history:
    get:
      operationId: getFaucetHistory
      tags: [faucet]
      summary: Recent claims across all chains
      responses:
        "200":
          description: Recent claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClaimRecord"

  /banners:
    get:
      operationId: getBanners
      tags: [banners]
      summary: List active ad banners
      responses:
        "200":
          description: Active banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"

  /announcements:
    get:
      operationId: getAnnouncements
      tags: [announcements]
      summary: List active announcements
      responses:
        "200":
          description: Active announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

  /prices:
    get:
      operationId: getPrices
      tags: [prices]
      summary: Live crypto prices from CoinGecko
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated CoinGecko IDs e.g. ethereum,binancecoin
      responses:
        "200":
          description: Price data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceItem"

  /admin/auth:
    post:
      operationId: adminAuth
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAuthInput"
      responses:
        "200":
          description: JWT token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Overall faucet statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/chains:
    get:
      operationId: getAdminChains
      tags: [admin]
      summary: List all chains (admin)
      responses:
        "200":
          description: All chains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChainAdmin"
    post:
      operationId: createChain
      tags: [admin]
      summary: Create a new chain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChainInput"
      responses:
        "201":
          description: Created chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainAdmin"

  /admin/chains/{id}/rpc-health:
    get:
      operationId: getChainRpcHealth
      tags: [admin]
      summary: Check health/latency of all RPC URLs for a chain
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RPC health results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RpcHealthResult"
        "404":
          description: Not found

  /admin/chains/{id}:
    patch:
      operationId: updateChain
      tags: [admin]
      summary: Update a chain
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChainUpdate"
      responses:
        "200":
          description: Updated chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainAdmin"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteChain
      tags: [admin]
      summary: Delete a chain
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings (public)
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /admin/settings:
    patch:
      operationId: updateSettings
      tags: [settings, admin]
      summary: Update site settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /admin/banners:
    get:
      operationId: getAdminBanners
      tags: [admin]
      summary: List all banners (admin)
      responses:
        "200":
          description: All banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"
    post:
      operationId: createBanner
      tags: [admin]
      summary: Create a banner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BannerInput"
      responses:
        "201":
          description: Created banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"

  /admin/banners/{id}:
    patch:
      operationId: updateBanner
      tags: [admin]
      summary: Update a banner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BannerUpdate"
      responses:
        "200":
          description: Updated banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBanner
      tags: [admin]
      summary: Delete a banner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/announcements:
    get:
      operationId: getAdminAnnouncements
      tags: [admin]
      summary: List all announcements (admin)
      responses:
        "200":
          description: All announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [admin]
      summary: Create an announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /admin/announcements/{id}:
    patch:
      operationId: updateAnnouncement
      tags: [admin]
      summary: Update an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAnnouncement
      tags: [admin]
      summary: Delete an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /support/conversations:
    post:
      operationId: startSupportConversation
      tags: [support]
      summary: Start a new support conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportStartInput"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportConversation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /support/conversations/{id}/messages:
    get:
      operationId: getSupportMessages
      tags: [support]
      summary: Get messages for a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportConversationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendSupportMessage
      tags: [support]
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportMessage"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/support:
    get:
      operationId: getAdminSupportConversations
      tags: [support]
      summary: List all support conversations (admin)
      responses:
        "200":
          description: All conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportConversation"

  /admin/support/{id}:
    get:
      operationId: getAdminSupportConversation
      tags: [support]
      summary: Get a conversation with all messages (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportConversationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSupportConversation
      tags: [support]
      summary: Update conversation status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [open, closed]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportConversation"

  /admin/support/{id}/reply:
    post:
      operationId: adminReplySupportConversation
      tags: [support]
      summary: Admin reply to a support conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportMessageInput"
      responses:
        "201":
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/upload:
    post:
      operationId: uploadImage
      tags: [admin]
      summary: Upload an image (logo, banner, etc.)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    PaymentNetwork:
      type: object
      required: [id, name, symbol, chainId]
      properties:
        id:
          type: string
        name:
          type: string
        symbol:
          type: string
        chainId:
          type: integer

    BuyInfo:
      type: object
      required: [chainId, chainName, symbol, receiveAddress, buyRate, minAmount, networks]
      properties:
        chainId:
          type: integer
        chainName:
          type: string
        symbol:
          type: string
        receiveAddress:
          type: string
        buyRate:
          type: string
          description: "How many testnet tokens per 1 mainnet ETH"
        minAmount:
          type: string
          description: "Minimum ETH to send"
        maxAmount:
          type: ["string", "null"]
          description: "Maximum ETH to send (null = unlimited)"
        networks:
          type: array
          items:
            $ref: "#/components/schemas/PaymentNetwork"

    BuyInput:
      type: object
      required: [chainId, userAddress, mainnetTxHash, networkId]
      properties:
        chainId:
          type: integer
        userAddress:
          type: string
        mainnetTxHash:
          type: string
        networkId:
          type: string
          description: "Payment network ID: eth, base, arbitrum, optimism, polygon"

    BuyResult:
      type: object
      required: [testnetTxHash, testnetAmountSent, symbol, chainName]
      properties:
        testnetTxHash:
          type: string
        testnetAmountSent:
          type: string
        symbol:
          type: string
        chainName:
          type: string

    ChainPublic:
      type: object
      required: [id, name, symbol, chainType, claimAmount, cooldownSeconds, isTestnet, isEnabled, availableStatus, buyEnabled, sortOrder]
      properties:
        id:
          type: integer
        name:
          type: string
        symbol:
          type: string
        chainId:
          type: ["integer", "null"]
          description: "EVM numeric chain ID (e.g. 1 = Ethereum, 11155111 = Sepolia, 137 = Polygon)"
        chainType:
          type: string
          enum: [evm, solana, ton, sui, aptos]
        logoUrl:
          type: ["string", "null"]
        claimAmount:
          type: string
        cooldownSeconds:
          type: integer
        isTestnet:
          type: boolean
        isEnabled:
          type: boolean
        isPinned:
          type: boolean
        gasPriceGwei:
          type: ["string", "null"]
        availableStatus:
          type: string
        buyEnabled:
          type: boolean
        buyUrl:
          type: ["string", "null"]
        buyRate:
          type: ["string", "null"]
        tokenPrice:
          type: ["string", "null"]
        explorerUrl:
          type: ["string", "null"]
        coingeckoId:
          type: ["string", "null"]
        soonMessage:
          type: ["string", "null"]
        adClaimEnabled:
          type: boolean
        adDurationSeconds:
          type: integer
        sortOrder:
          type: integer

    ChainDetail:
      type: object
      required: [id, name, symbol, chainType, claimAmount, cooldownSeconds, isTestnet, isEnabled, availableStatus, buyEnabled, sortOrder]
      properties:
        id:
          type: integer
        name:
          type: string
        symbol:
          type: string
        chainId:
          type: ["integer", "null"]
          description: "EVM numeric chain ID (e.g. 1 = Ethereum, 11155111 = Sepolia, 137 = Polygon)"
        chainType:
          type: string
          enum: [evm, solana, ton, sui, aptos]
        logoUrl:
          type: ["string", "null"]
        claimAmount:
          type: string
        cooldownSeconds:
          type: integer
        isTestnet:
          type: boolean
        isEnabled:
          type: boolean
        isPinned:
          type: boolean
        gasPriceGwei:
          type: ["string", "null"]
        availableStatus:
          type: string
        buyEnabled:
          type: boolean
        buyUrl:
          type: ["string", "null"]
        tokenPrice:
          type: ["string", "null"]
        explorerUrl:
          type: ["string", "null"]
        coingeckoId:
          type: ["string", "null"]
        soonMessage:
          type: ["string", "null"]
        sortOrder:
          type: integer
        walletBalanceEth:
          type: ["string", "null"]

    RpcHealthResult:
      type: object
      required: [url, status, latencyMs]
      properties:
        url:
          type: string
        status:
          type: string
          enum: [ok, error]
        latencyMs:
          type: integer
        error:
          type: ["string", "null"]

    ChainAdmin:
      type: object
      required: [id, name, symbol, chainType, rpcUrl, rpcUrls, walletAddress, claimAmount, cooldownSeconds, isTestnet, isEnabled, availableStatus, buyEnabled, buyRate, buyMinAmount, buyCurrencies, sortOrder, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        symbol:
          type: string
        chainId:
          type: ["integer", "null"]
          description: "EVM numeric chain ID (e.g. 1 = Ethereum, 11155111 = Sepolia, 137 = Polygon)"
        chainType:
          type: string
          enum: [evm, solana, ton, sui, aptos]
        logoUrl:
          type: ["string", "null"]
        rpcUrl:
          type: string
        rpcUrls:
          type: array
          items:
            type: string
          description: "Ordered list of RPC URLs — primary first, fallbacks after"
        walletAddress:
          type: string
        claimAmount:
          type: string
        cooldownSeconds:
          type: integer
        isTestnet:
          type: boolean
        isEnabled:
          type: boolean
        isPinned:
          type: boolean
        gasPriceGwei:
          type: ["string", "null"]
        availableStatus:
          type: string
        buyEnabled:
          type: boolean
        buyUrl:
          type: ["string", "null"]
        buyRate:
          type: string
        buyMinAmount:
          type: string
        buyMaxAmount:
          type: ["string", "null"]
          description: "Maximum ETH purchase amount (null = unlimited)"
        buyCurrencies:
          type: string
          description: "JSON array of enabled payment network IDs e.g. [\"eth\",\"base\"]"
        receiveAddress:
          type: ["string", "null"]
        explorerUrl:
          type: ["string", "null"]
        tokenPrice:
          type: ["string", "null"]
        coingeckoId:
          type: ["string", "null"]
        soonMessage:
          type: ["string", "null"]
        adClaimEnabled:
          type: boolean
        adClaimAmount:
          type: ["string", "null"]
        adDurationSeconds:
          type: integer
        adNetworkCode:
          type: ["string", "null"]
          description: "URL or HTML embed code for the ad to display (shown in iframe)"
        sortOrder:
